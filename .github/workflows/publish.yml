name: "🚀 Publish Plugin"

on:
  release:
    types:
      - released
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Download Jellyfin 10.12.0 binaries for references
        run: |
          mkdir -p ./jellyfin-libs
          
          # Use a python script to find the latest 10.12.0 unstable tarball from the repo
          cat <<'EOF' > find_latest.py
          import urllib.request
          import re
          import sys

          url = "https://repo.jellyfin.org/releases/server/linux/unstable/combined/"
          try:
              with urllib.request.urlopen(url) as response:
                  html = response.read().decode('utf-8')
                  # Find all tar.gz files that look like 10.12.0
                  # Example: jellyfin_10.12.0-unstable.20240410.1_amd64.tar.gz
                  matches = re.findall(r'href="([^"]*jellyfin_10\.12\.0[^"]*amd64\.tar\.gz)"', html)
                  if matches:
                      # Get the last one (usually newest)
                      print(url + matches[-1])
                      sys.exit(0)
          except Exception as e:
              print(f"Error: {e}", file=sys.stderr)
          
          # Fallback to stable if unstable not found
          print("https://repo.jellyfin.org/releases/server/linux/stable/combined/jellyfin_10.11.8_amd64.tar.gz")
          EOF

          DOWNLOAD_URL=$(python3 find_latest.py)
          echo "Downloading from: $DOWNLOAD_URL"
          wget -q "$DOWNLOAD_URL" -O jellyfin.tar.gz
          
          tar -xzf jellyfin.tar.gz -C ./jellyfin-libs --strip-components=1 --wildcards "*/jellyfin/*.dll" || \
          tar -xzf jellyfin.tar.gz -C ./jellyfin-libs --wildcards "*.dll"
          
          # Flatten if needed
          find ./jellyfin-libs -name "*.dll" -exec cp {} ./jellyfin-libs/ \;
          ls -l ./jellyfin-libs/*.dll | head -n 5

      - name: Build
        run: |
          export ReferencePath="$(pwd)/jellyfin-libs"
          dotnet build Gelato.csproj -c Release -f net9.0 /p:ReferencePath="$ReferencePath"

      - name: Prepare publish directory
        run: |
          mkdir -p ./publish
          cp bin/Release/net9.0/Gelato.dll ./publish/
          cp bin/Release/net9.0/Mono.Nat.dll ./publish/
          cp bin/Release/net9.0/MonoTorrent*.dll ./publish/
          cp bin/Release/net9.0/ReusableTasks.dll ./publish/
          cp bin/Release/net9.0/0Harmony.dll ./publish/ 2>/dev/null || true
          cp bin/Release/net9.0/JellyfinLoaderStub*.dll ./publish/ 2>/dev/null || true

      - name: Prepare meta.json
        run: |
          VERSION=$(grep '<Version>' Gelato.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
          TARGET_ABI="10.12.0.0"
          cat <<EOF > ./publish/meta.json
          {
            "category": "General",
            "guid": "94EA4E14-8163-4989-96FE-0A2094BC2D6A",
            "name": "Gelato",
            "overview": "Stream external media.",
            "description": "Stream external media (Fork for 10.12.0).",
            "owner": "Joey",
            "targetAbi": "$TARGET_ABI",
            "version": "$VERSION",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Create Zip
        run: |
          VERSION=$(grep '<Version>' Gelato.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
          cd publish
          zip -r ../gelato_$VERSION.zip .
          cd ..

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: gelato_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-repo:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main_branch

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh_pages_branch

      - name: Generate repository.json
        run: |
          cd main_branch
          VERSION=$(grep '<Version>' Gelato.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
          TARGET_ABI="10.12.0.0"
          
          # Delay a moment to ensure release asset is fully available
          sleep 10
          
          wget https://github.com/${{ github.repository }}/releases/download/v$VERSION/gelato_$VERSION.zip
          CHECKSUM=$(md5sum gelato_$VERSION.zip | awk '{print $1}')
          
          cat <<EOF > ../gh_pages_branch/repository.json
          [
            {
              "category": "General",
              "description": "Stream external media.",
              "guid": "94EA4E14-8163-4989-96FE-0A2094BC2D6A",
              "name": "Gelato",
              "overview": "Stream external media.",
              "owner": "Joey",
              "versions": [
                {
                  "changelog": "Automatically generated release.",
                  "checksum": "$CHECKSUM",
                  "sourceUrl": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/gelato_$VERSION.zip",
                  "targetAbi": "$TARGET_ABI",
                  "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
                  "version": "$VERSION"
                }
              ]
            }
          ]
          EOF
          
          cp ../gh_pages_branch/repository.json ../gh_pages_branch/manifest.json

      - name: Commit and Push
        run: |
          cd gh_pages_branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repository.json manifest.json
          git commit -m "Regenerate Jellyfin plugin repository for v$VERSION" || echo "No changes to commit"
          git push origin gh-pages
