name: "🚀 Publish Plugin"

on:
  release:
    types:
      - released
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build
        run: dotnet build Gelato.csproj -c Release -f net9.0

      - name: Prepare publish directory
        run: |
          mkdir -p ./publish
          cp bin/Release/net9.0/Gelato.dll ./publish/
          cp bin/Release/net9.0/Mono.Nat.dll ./publish/
          cp bin/Release/net9.0/MonoTorrent*.dll ./publish/
          cp bin/Release/net9.0/ReusableTasks.dll ./publish/
          # Copy Harmony or Stub if they exist (ignoring errors if not)
          cp bin/Release/net9.0/0Harmony.dll ./publish/ 2>/dev/null || true
          cp bin/Release/net9.0/JellyfinLoaderStub*.dll ./publish/ 2>/dev/null || true

      - name: Prepare meta.json
        run: |
          VERSION=$(grep '<Version>' Gelato.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
          TARGET_ABI="10.12.0.0"
          cat <<EOF > ./publish/meta.json
          {
            "category": "General",
            "guid": "94EA4E14-8163-4989-96FE-0A2094BC2D6A",
            "name": "Gelato",
            "overview": "Stream external media.",
            "description": "Stream external media (Fork for 10.12.0).",
            "owner": "Joey",
            "targetAbi": "$TARGET_ABI",
            "version": "$VERSION",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: Create Zip
        run: |
          VERSION=$(grep '<Version>' Gelato.csproj | sed -E 's/.*<Version>(.*)<\/Version>.*/\1/')
          cd publish
          zip -r ../gelato_$VERSION.zip .
          cd ..

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: gelato_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-repo:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          pagesBranch: gh-pages
